# =============================================================================
# AETHEL — Default Configuration
# Pan-European Biostatistical Risk & Population Health Engine
# =============================================================================

project:
  name: AETHEL
  version: 3.0.0
  description: "Pan-European Biostatistical Risk & Population Health Engine"

# ---------------------------------------------------------------------------
# Dataset registry — all cohort sources managed here.
# Never hardcode dataset names anywhere else; reference DatasetNames constants.
# ---------------------------------------------------------------------------
datasets:
  synthetic:
    name: "AETHEL Synthetic Cohort"
    path: "data/processed/analytical_cohort.csv"
    outcome_col: "event_occurred"
    outcome_type: "binary"       # binary | survival | none
    supervised: true
    description: "Pan-European synthetic respiratory disease cohort (1,000 patients)"
    population: "European (simulated)"
    domain: "Respiratory"
    enabled: true

  framingham:
    name: "Framingham Heart Study"
    path: "data/framingham/framingham.csv"
    outcome_col: "TenYearCHD"
    outcome_type: "binary"
    supervised: true
    description: "US cardiovascular community cohort — 10-year CHD risk"
    population: "US community (Framingham, MA)"
    domain: "Cardiovascular"
    enabled: true
    harmonized_outcome_note: >
      TenYearCHD is a 10-year binary CHD risk indicator. Cross-cohort
      comparison with Synthetic (respiratory) requires acknowledging
      different clinical endpoints. Structural equivalence as binary
      outcomes is assumed; endpoint difference is documented.

  nhanes:
    name: "NHANES Biochemical Survey"
    path: "data/framingham/combined_data.csv"
    outcome_col: null
    outcome_type: "none"
    supervised: false
    description: "US national health survey — biochemical markers only (no outcome)"
    population: "US general population"
    domain: "Cardiovascular/Metabolic"
    enabled: true
    limitations: >
      No age, BMI, smoking, sex, or outcome variable present.
      Suitable for domain shift / covariate distribution analysis only.
      Cannot support supervised training or evaluation.

# ---------------------------------------------------------------------------
# Harmonization settings
# ---------------------------------------------------------------------------
harmonization:
  imputation_strategy: "median"     # for continuous missing values
  binary_imputation: "mode"         # for binary missing values
  min_common_features: 2            # minimum features for cross-cohort experiment
  intersection_datasets: ["synthetic", "framingham"]  # supervised intersection


pipeline_controls:
  generate_environment: true
  generate_clinical: true
  run_feature_engineering: true
  run_validation: true
  run_feature_engineering_derived: true
  run_splitting: true
  run_preprocessing_pipeline: true
  run_feature_selection: true
  execute_survival_model: true

seeds:
  python: 42
  r: 123

study_parameters:
  n_subjects: 1000
  observation_years: 5
  total_cities: 90
  follow_up_months: 60

data_paths:
  registry: "data/raw/eu_registry.csv"
  raw_clinical: "data/raw/synthetic_clinical_cohort.csv"
  raw_environmental: "data/raw/regional_environmental_history.csv"
  processed_cohort: "data/processed/analytical_cohort.csv"
  train_cohort: "data/processed/train.csv"
  val_cohort: "data/processed/val.csv"
  test_cohort: "data/processed/test.csv"

output_paths:
  models: "outputs/models"
  figures: "outputs/figures"
  metrics: "outputs/metrics"
  predictions: "outputs/predictions"
  shap: "outputs/shap"
  calibration: "outputs/calibration"
  logs: "outputs/logs"
  reports: "outputs/reports"

model_params:
  rsf_ntree: 500
  rsf_importance: true

# ---------------------------------------------------------------------------
# Preprocessing (train/val/test split parameters)
# ---------------------------------------------------------------------------
preprocessing:
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15
  stratify_on: "event_occurred"
  scaler_type: "robust"   # robust | standard | minmax

# ---------------------------------------------------------------------------
# Data validation — clinical plausibility bounds per feature
# stop_on_error: false = log warnings (for synthetic data)
#                true  = raise exception (for real patient data)
# ---------------------------------------------------------------------------
validation:
  stop_on_error: false
  clinical_bounds:
    age:                [18,   120]
    bmi:                [10,   80]
    is_smoker:          [0,    1]
    genomic_risk_score: [-6.0, 6.0]
    townsend_index:     [-15.0, 20.0]
    avg_pm25_exposure:  [0.0,  100.0]
    avg_no2_exposure:   [0.0,  200.0]
    months_observed:    [0.0,  60.0]
    event_occurred:     [0,    1]

# ---------------------------------------------------------------------------
# Feature engineering toggles
# ---------------------------------------------------------------------------
feature_engineering:
  add_bmi_category: true
  add_age_group: true
  add_pollution_index: true      # fit on train only; replaces avg_no2_exposure in model
  add_lifestyle_risk: true       # is_smoker x townsend_index interaction
  add_high_genomic_risk: true    # binary flag: genomic_risk_score > threshold
  genomic_risk_threshold: 1.0   # 1 SD above mean (precision medicine convention)

# ---------------------------------------------------------------------------
# Feature selection thresholds (computed on training fold only)
# ---------------------------------------------------------------------------
feature_selection:
  vif_threshold: 10.0
  correlation_threshold: 0.90
  mi_top_k: 10

# ---------------------------------------------------------------------------
# Survival model covariates (authoritative list)
# avg_no2_exposure removed — VIF = 15.25 with avg_pm25_exposure.
# Replaced by pollution_index (combined z-scored burden, fit on train only).
# ---------------------------------------------------------------------------
features:
  survival_covariates:
    - age
    - is_smoker
    - genomic_risk_score
    - townsend_index
    - avg_pm25_exposure
    - pollution_index
    - lifestyle_risk
    - high_genomic_risk

default_dashboard_regions:
  - UK
  - DE
  - CH
  - SE
  - FI
  - NO
  - DK
